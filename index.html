<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סימולטור שאגת הארי 🦁</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&family=Assistant:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Heebo", sans-serif; background: #eef2f7; color: #1e293b; min-height: 100vh; }
    input, select { font-family: "Heebo", sans-serif; }
    input:focus, select:focus { outline: none; border-color: #c9973a !important; box-shadow: 0 0 0 3px rgba(201,151,58,.15); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    @media (max-width: 768px) {
      .panels-grid { grid-template-columns: 1fr !important; }
    }
    @media print {
      body > div > *:not(#print-area) { display: none !important; }
      #print-area { display: block !important; padding: 20px; font-family: "Heebo", sans-serif; }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
    #print-area { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── חישוב ──────────────────────────────────────────────────
    function calcGrant(d) {
      const annual = parseFloat(d.annual) || 0;
      const annualExp = parseFloat(d.annualExp) || 0;
      const elig = parseFloat(d.elig) || 0;
      const sal102 = parseFloat(d.sal102) || 0;
      const numEmp = parseFloat(d.numEmp) || 0;
      const miluum = parseFloat(d.miluum) || 0;
      const chalat = parseFloat(d.chalat) || 0;
      const baseMultiplier = parseFloat(d.baseMultiplier) || 1.2;
      const isAssoc = d.entity === 'עמותה / מלכ"ר';
      const isDuo = d.reportType === "דו חודשי";

      const avg2025 = annual > 0 ? annual / 12 : 0;
      const avgExp = annualExp > 0 ? annualExp / 12 : 0;
      const base = avg2025 * baseMultiplier;
      const drop = base > 0 ? Math.min((base - elig) / base, 1) : 0;
      const minDrop = isDuo ? 0.125 : 0.25;
      const passes = drop >= minDrop && annual > 0;

      let fb = 0;
      if (isDuo) {
        if (drop >= 0.40) fb = 0.22;
        else if (drop >= 0.30) fb = 0.15;
        else if (drop >= 0.20) fb = 0.11;
        else if (drop >= 0.125) fb = 0.07;
      } else {
        if (drop >= 0.80) fb = 0.22;
        else if (drop >= 0.60) fb = 0.15;
        else if (drop >= 0.40) fb = 0.11;
        else if (drop >= 0.25) fb = 0.07;
      }
      let f = fb;
      if (d.isKaplan) f *= 0.68;
      if (d.factorBoost) f *= 1.5;

      const fixedGrant = avgExp * f;
      const empMult = isAssoc ? 1.325 : 1.25;
      const netSal = Math.max(0, sal102 - miluum - chalat);
      const salBefore = netSal * empMult * 0.75 * drop;
      const salCap = numEmp > 0 ? 13773 * empMult * numEmp * drop : Infinity;
      const salGrant = Math.min(salBefore, isFinite(salCap) ? salCap : salBefore);
      const total = fixedGrant + salGrant;

      let globalCap = 0;
      if (annual > 0) {
        if (annual <= 100000000) globalCap = 600000;
        else if (annual <= 300000000) globalCap = 600000 + 0.003 * (annual - 100000000);
        else globalCap = 1200000;
      }

      const finalGrant = passes ? Math.min(total, globalCap) : 0;
      return { avg2025, avgExp, base, drop, minDrop, passes, f, fb, fixedGrant, empMult, netSal, salBefore, salCap, salGrant, total, globalCap, finalGrant, hasData: annual > 0 };
    }

    const IL = (n) => (!isFinite(n) || isNaN(n) || n === 0) ? "—" : "\u20AA\u202F" + Math.round(n).toLocaleString("he-IL");
    const ILv = (n) => (!isFinite(n) || isNaN(n)) ? "—" : "\u20AA\u202F" + Math.round(n).toLocaleString("he-IL");
    const P = (n) => (!n || isNaN(n)) ? "—" : (n*100).toFixed(1)+"%";
    const STORAGE_KEY = "shaagat_haari_v4";
    const EMPTY = () => ({ name:"", entity:"עוסק מורשה", reportType:"חד חודשי", annual:"", annualExp:"", elig:"", sal102:"", numEmp:"", miluum:"", chalat:"", baseMultiplier:"1.2", factorBoost:false, isKaplan:false });

    // ── UI helpers ─────────────────────────────────────────────
    const navy = "#0f2744", navy2 = "#1a3a5c", gold = "#c9973a", gold2 = "#f0c060";
    const green = "#1a6b37", greenBg = "#edfaf3", red = "#b91c1c", redBg = "#fef2f2";
    const gray = "#94a3b8", grayL = "#f1f5f9", border = "#dde3ed", text = "#1e293b";

    function Sec({ children }) {
      return <div style={{ fontSize:10, fontWeight:800, color:navy2, textTransform:"uppercase", letterSpacing:".6px", padding:"10px 16px 3px", background:grayL, borderTop:`1px solid ${border}`, borderBottom:`1px solid ${border}`, marginTop:4 }}>{children}</div>;
    }

    function Field({ label, value, onChange, suffix, hint, select, isAssumption, half }) {
      const w = half ? "50%" : "100%";
      return (
        <div style={{ padding:"7px 16px 3px", width:w, display:"inline-block", boxSizing:"border-box", verticalAlign:"top" }}>
          <label style={{ display:"block", fontSize:11, fontWeight:700, color:text, marginBottom:3 }}>{label}</label>
          <div style={{ position:"relative", display:"flex", alignItems:"center" }}>
            {select
              ? <select value={value} onChange={e => onChange(e.target.value)} style={{ width:"100%", padding:"7px 10px", border:`1.5px solid ${border}`, borderRadius:7, fontSize:13, fontFamily:"inherit", background:"#e8f3ff", color:"#0050c0", outline:"none", cursor:"pointer", WebkitAppearance:"none", appearance:"none" }}>
                  {select.map(o => <option key={o}>{o}</option>)}
                </select>
              : <input value={value} onChange={e => onChange(e.target.value)} placeholder="—"
                  style={{ width:"100%", padding:"7px 10px", paddingLeft: suffix ? 28 : 10, border:`1.5px solid ${isAssumption ? "#f0b429" : border}`, borderRadius:7, fontSize:13, fontFamily:"inherit", background: isAssumption ? "#fff8e1" : "#e8f3ff", color: isAssumption ? "#92400e" : "#0050c0", outline:"none" }} />
            }
            {suffix && <span style={{ position:"absolute", left:9, color:gray, fontSize:12, pointerEvents:"none" }}>{suffix}</span>}
          </div>
          {hint && <div style={{ fontSize:10, color:gray, marginTop:3, lineHeight:1.4 }}>{hint}</div>}
        </div>
      );
    }

    function RR({ label, val, sub, formula, hi, warn, rr }) {
      const bg = hi ? greenBg : warn ? redBg : "transparent";
      const vc = hi ? green : warn ? red : navy;
      return (
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", padding:"7px 16px", borderBottom:`1px solid ${grayL}`, background:bg, gap:8 }}>
          <div style={{ display:"flex", flexDirection:"column", gap:2, flex:1 }}>
            <span style={{ fontSize:12, color:text }}>{label}</span>
            {rr && <span style={{ fontSize:10, color:gray }}>{rr}</span>}
            {formula && <span style={{ fontSize:10, color:gray, fontStyle:"italic" }}>{formula}</span>}
          </div>
          <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:2, flexShrink:0 }}>
            <span style={{ fontSize:13, fontWeight:800, color:vc }}>{val}</span>
            {sub && <span style={{ fontSize:10, color:gray }}>{sub}</span>}
          </div>
        </div>
      );
    }

    function EmptyState() {
      return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"48px 24px", color:gray, textAlign:"center", flex:1 }}>
          <div style={{ fontSize:48, marginBottom:16 }}>🦁</div>
          <div style={{ fontSize:16, fontWeight:700, color:navy2, marginBottom:8 }}>מלא את הנתונים לראות תוצאות</div>
          <div style={{ fontSize:13, lineHeight:1.7, maxWidth:260 }}>הזן לפחות מחזור שנתי 2025 ומחזור זכאות 03/2026 — התוצאות יעודכנו אוטומטית.</div>
        </div>
      );
    }

    // ── App ────────────────────────────────────────────────────
    function App() {
      const [clients, setClients] = useState(() => {
        try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch {}
        return [EMPTY()];
      });
      const [activeIdx, setActiveIdx] = useState(0);
      const [view, setView] = useState("edit");
      const [saved, setSaved] = useState(false);
      const printDate = new Date().toLocaleDateString("he-IL", { day:"2-digit", month:"2-digit", year:"numeric" });

      useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(clients)); } catch {} }, [clients]);

      const upd = useCallback((idx, f, v) => setClients(p => p.map((c,i) => i===idx ? {...c,[f]:v} : c)), []);
      const addClient = () => { setClients(p => [...p, EMPTY()]); setActiveIdx(clients.length); setView("edit"); };
      const removeClient = (idx) => {
        if (clients.length === 1) { setClients([EMPTY()]); return; }
        setClients(p => p.filter((_,i) => i!==idx));
        setActiveIdx(Math.max(0, idx-1));
      };

      const results = clients.map(calcGrant);
      const ac = clients[activeIdx];
      const ar = results[activeIdx];

      const handlePrint = () => { if (!ar.hasData) return; setTimeout(() => window.print(), 100); };

      return (
        <div dir="rtl" style={{ fontFamily:"'Heebo', sans-serif", minHeight:"100vh", background:"#eef2f7", color:text, display:"flex", flexDirection:"column" }}>

          {/* PRINT AREA */}
          <div id="print-area">
            <div style={{ display:"flex", justifyContent:"space-between", borderBottom:`3px solid ${navy}`, paddingBottom:10, marginBottom:14 }}>
              <div>
                <div style={{ fontSize:20, fontWeight:900, color:navy }}>🦁 סימולטור שאגת הארי</div>
                <div style={{ fontSize:11, color:gray }}>מבוסס על טיוטת מסמך לשכת יועצי המס בלבד</div>
              </div>
              <div style={{ textAlign:"left" }}>
                <div style={{ fontSize:14, fontWeight:800, color:navy }}>{ac.name || "ללא שם"}</div>
                <div style={{ fontSize:11, color:gray }}>הופק: {printDate}</div>
              </div>
            </div>
            <div style={{ background:"#fef3c7", border:"1px solid #f59e0b", borderRadius:6, padding:"10px 14px", fontSize:11, color:"#92400e", lineHeight:1.7, marginBottom:16 }}>
              <strong>⚠️ דיסקליימר חשוב:</strong> מסמך זה הינו <strong>סימולציה בלבד</strong> המבוססת על טיוטת מתווה "שאגת הארי" של לשכת יועצי המס. המתווה <strong>טרם אושר ונחקק</strong> ועשוי להשתנות. אין ייעוץ מקצועי. יש לאמת עם יועץ מס מוסמך.
            </div>
            {ar.hasData && <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead><tr style={{ background:navy }}>
                <th style={{ color:"#fff", padding:"8px 10px", textAlign:"right" }}>פרמטר</th>
                <th style={{ color:"#fff", padding:"8px 10px", textAlign:"right" }}>ערך</th>
                <th style={{ color:"#fff", padding:"8px 10px", textAlign:"right" }}>הערה</th>
              </tr></thead>
              <tbody>
                {[
                  ["S","א. נתוני קלט"],
                  ["מחזור שנתי 2025", ILv(parseFloat(ac.annual)), "עמוד 2"],
                  ["הוצאות שנתי 2025", ILv(parseFloat(ac.annualExp)), "עמוד 6"],
                  ["מחזור זכאות", ILv(parseFloat(ac.elig)), "עמוד 10"],
                  ["שכר טופס 102", ILv(parseFloat(ac.sal102)), "עמוד 5"],
                  ["מספר עובדים", ac.numEmp||"—", ""],
                  ["מכפיל בסיס", ac.baseMultiplier+"×", "⚠️ הנחת עבודה"],
                  ["S","ב. חישוב"],
                  ["ממוצע חודשי 2025", ILv(ar.avg2025), "מחזור ÷ 12"],
                  ["מחזור בסיס", ILv(ar.base), `ממוצע × ${ac.baseMultiplier} | ⚠️ לאימות`],
                  ["שיעור ירידה", P(ar.drop), `(בסיס − זכאות) ÷ בסיס`],
                  ["עובר סף?", ar.passes ? "✅ כן" : "❌ לא", `סף: ${P(ar.minDrop)}`],
                  ["מקדם פיצוי", P(ar.f), "עמוד 4"],
                  ["מענק הוצאות קבועות", ILv(ar.fixedGrant), `${ILv(ar.avgExp)} × ${P(ar.f)}`],
                  ["שכר נטו", ILv(ar.netSal), "102 − מילואים − חל"ת"],
                  ["מענק שכר", ILv(ar.salGrant), "עמוד 5"],
                  ["S","ג. סיכום"],
                  ["סה"כ לפני תקרה", ILv(ar.total), ""],
                  ["תקרה כללית", ILv(ar.globalCap), "עמוד 7"],
                  ["F", `🏆 מענק סופי: ${ILv(ar.finalGrant)}`, ar.total > ar.globalCap ? `⚠️ הפסד בתקרה: ${ILv(ar.total - ar.globalCap)}` : ""]
                ].map((row, i) => {
                  if (row[0]==="S") return <tr key={i} style={{ background:navy2 }}><td colSpan={3} style={{ color:"rgba(255,255,255,.8)", padding:"5px 10px", fontWeight:700 }}>{row[1]}</td></tr>;
                  if (row[0]==="F") return <tr key={i} style={{ background:"#fef8ec" }}><td colSpan={2} style={{ padding:"10px", fontWeight:900, fontSize:15 }}>{row[1]}</td><td style={{ padding:"10px", color:red, fontSize:11 }}>{row[2]}</td></tr>;
                  return <tr key={i} style={{ borderBottom:`1px solid ${border}` }}><td style={{ padding:"6px 10px", fontWeight:600 }}>{row[0]}</td><td style={{ padding:"6px 10px" }}>{row[1]}</td><td style={{ padding:"6px 10px", color:gray, fontSize:11 }}>{row[2]}</td></tr>;
                })}
              </tbody>
            </table>}
            <div style={{ marginTop:14, fontSize:10, color:gray, borderTop:`1px solid ${border}`, paddingTop:8, textAlign:"center" }}>סימולטור שאגת הארי | טיוטת מסמך לשכת יועצי המס בלבד | {printDate}</div>
          </div>

          {/* HEADER */}
          <div style={{ background:navy, height:58, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 20px", borderBottom:`3px solid ${gold}`, position:"sticky", top:0, zIndex:200, flexShrink:0 }}>
            <div>
              <div style={{ fontFamily:"'Assistant', sans-serif", fontSize:17, fontWeight:800, color:"#fff" }}>🦁 סימולטור שאגת הארי</div>
              <div style={{ fontSize:10, color:gold2 }}>מבוסס על טיוטת מסמך לשכת יועצי המס | טרם אושר ונחקק</div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              {clients.length > 1 && (
                <button onClick={() => setView(v => v==="compare" ? "edit" : "compare")}
                  style={{ padding:"6px 14px", borderRadius:7, border:"1.5px solid rgba(255,255,255,.25)", background:"rgba(255,255,255,.1)", color:"#fff", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                  {view==="compare" ? "↩ עריכה" : "⚖️ השווה"}
                </button>
              )}
              <button onClick={handlePrint} disabled={!ar.hasData}
                style={{ padding:"6px 14px", borderRadius:7, border:"none", background: ar.hasData ? "#7c3aed" : "#475569", color:"#fff", fontSize:12, fontWeight:700, cursor: ar.hasData ? "pointer" : "not-allowed", fontFamily:"inherit", opacity: ar.hasData ? 1 : 0.6 }}>
                🖨️ הדפס / PDF
              </button>
              <button onClick={() => { setSaved(true); setTimeout(() => setSaved(false), 2000); }}
                style={{ padding:"6px 14px", borderRadius:7, border:"none", background: saved ? green : gold, color:"#fff", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                {saved ? "✓ נשמר" : "💾 שמור"}
              </button>
            </div>
          </div>

          {/* DISCLAIMER */}
          <div style={{ background:"#fef3c7", borderBottom:"1px solid #f59e0b", padding:"7px 20px", fontSize:11, color:"#92400e", lineHeight:1.5 }}>
            ⚠️ <strong>דיסקליימר:</strong> סימולציה בלבד המבוססת על <strong>טיוטת</strong> מתווה "שאגת הארי" של לשכת יועצי המס. המתווה <strong>טרם אושר ונחקק</strong>. אין ייעוץ מקצועי. יש לאמת עם יועץ מס מוסמך.
          </div>

          {/* TABS */}
          {view !== "compare" && (
            <div style={{ background:navy2, padding:"0 20px", display:"flex", alignItems:"flex-end", gap:3, overflowX:"auto", flexShrink:0 }}>
              {clients.map((c,i) => (
                <button key={i} onClick={() => { setActiveIdx(i); setView("edit"); }}
                  style={{ padding:"9px 14px 8px", borderRadius:"8px 8px 0 0", border:"none", cursor:"pointer", fontSize:12, fontWeight:700, fontFamily:"inherit", whiteSpace:"nowrap", display:"flex", alignItems:"center", gap:7, background: i===activeIdx ? "#eef2f7" : "transparent", color: i===activeIdx ? navy : "rgba(255,255,255,.5)" }}>
                  {c.name || `לקוח ${i+1}`}
                  {results[i].hasData && results[i].finalGrant > 0 && (
                    <span style={{ fontSize:10, background:gold, color:"#fff", padding:"2px 6px", borderRadius:10, fontWeight:700 }}>{ILv(results[i].finalGrant)}</span>
                  )}
                  <span onClick={e => { e.stopPropagation(); removeClient(i); }} style={{ opacity:.4, fontSize:13, cursor:"pointer" }} title={clients.length===1?"נקה":"הסר"}>✕</span>
                </button>
              ))}
              <button onClick={addClient} style={{ padding:"9px 14px 8px", border:"none", background:"transparent", color:gold2, fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>＋ לקוח חדש</button>
            </div>
          )}

          {/* COMPARE */}
          {view === "compare" ? (
            <div style={{ flex:1, padding:20, overflowX:"auto" }}>
              <div style={{ fontFamily:"'Assistant',sans-serif", fontSize:17, fontWeight:800, color:navy, marginBottom:14 }}>⚖️ השוואה בין {clients.length} לקוחות</div>
              <table style={{ width:"100%", borderCollapse:"collapse", background:"#fff", borderRadius:10, overflow:"hidden", boxShadow:"0 2px 16px rgba(15,39,68,.10)" }}>
                <thead><tr>
                  <th style={{ background:navy, color:"#fff", padding:"11px 14px", textAlign:"right", fontSize:12 }}>פרמטר</th>
                  {clients.map((c,i) => <th key={i} style={{ background:navy, color:"#fff", padding:"11px 14px", textAlign:"right", fontSize:12 }}>{c.name||`לקוח ${i+1}`}</th>)}
                </tr></thead>
                <tbody>
                  {[
                    {sec:"מחזורים"},
                    {l:"מחזור שנתי 2025", f:i=>ILv(parseFloat(clients[i].annual))},
                    {l:"ממוצע הוצאות חודשי", f:i=>ILv(results[i].avgExp)},
                    {l:"מחזור זכאות", f:i=>ILv(parseFloat(clients[i].elig))},
                    {sec:"חישוב"},
                    {l:"שיעור ירידה", f:i=><span style={{color:green,fontWeight:800}}>{P(results[i].drop)}</span>},
                    {l:"עובר סף?", f:i=>results[i].passes?"✅ כן":(results[i].hasData?"❌ לא":"—")},
                    {l:"מקדם פיצוי", f:i=>P(results[i].f)},
                    {l:"מענק הוצאות קבועות", f:i=>ILv(results[i].fixedGrant)},
                    {l:"מענק שכר", f:i=>ILv(results[i].salGrant)},
                    {sec:"סיכום"},
                    {l:"סה"כ לפני תקרה", f:i=>ILv(results[i].total)},
                    {l:"תקרה כללית", f:i=>ILv(results[i].globalCap)},
                    {l:"הפסד בתקרה", f:i=>results[i].total>results[i].globalCap&&results[i].hasData?<span style={{color:red}}>{ILv(results[i].total-results[i].globalCap)}</span>:"—"},
                    {final:true, l:"🏆 מענק סופי", f:i=>ILv(results[i].finalGrant)},
                  ].map((row,ri) => {
                    if (row.sec) return <tr key={ri}><td colSpan={clients.length+1} style={{ background:navy2, color:"rgba(255,255,255,.75)", padding:"6px 14px", fontWeight:700, fontSize:11 }}>{row.sec}</td></tr>;
                    return <tr key={ri} style={{ background: row.final ? "#fef8ec" : "transparent" }}>
                      <td style={{ padding:"9px 14px", fontWeight:row.final?800:600, fontSize:row.final?14:12, color:navy2, background:grayL, borderBottom:`1px solid ${border}` }}>{row.l}</td>
                      {clients.map((_,i) => <td key={i} style={{ padding:"9px 14px", fontSize:row.final?15:12, fontWeight:row.final?900:400, borderBottom:`1px solid ${border}` }}>{row.f(i)}</td>)}
                    </tr>;
                  })}
                </tbody>
              </table>
              <div style={{ marginTop:10, fontSize:11, color:gray }}>⚠️ סימולציה בלבד | מתווה טרם אושר ונחקק | אין ייעוץ מקצועי</div>
            </div>

          ) : (
            /* EDIT */
            <div style={{ flex:1, padding:"16px 20px", overflowY:"auto" }}>
              <div className="panels-grid" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>

                {/* INPUT */}
                <div style={{ background:"#fff", borderRadius:10, border:`1px solid ${border}`, boxShadow:"0 2px 16px rgba(15,39,68,.08)", overflow:"hidden" }}>
                  <div style={{ background:navy, color:"#fff", padding:"11px 16px", fontSize:13, fontWeight:700, fontFamily:"'Assistant',sans-serif" }}>📋 נתוני קלט</div>
                  <Sec>א. פרטי העסק</Sec>
                  <Field label="שם העסק / לקוח" value={ac.name} onChange={v=>upd(activeIdx,"name",v)} />
                  <div style={{display:"flex"}}>
                    <Field label="סוג ישות" value={ac.entity} onChange={v=>upd(activeIdx,"entity",v)} select={["עוסק מורשה","עוסק פטור","עמותה / מלכ"ר","קבלן ביצוע"]} half />
                    <Field label="דיווח מע"מ" value={ac.reportType} onChange={v=>upd(activeIdx,"reportType",v)} select={["חד חודשי","דו חודשי"]} half />
                  </div>
                  <Sec>ב. מחזורים</Sec>
                  <Field label="מחזור שנתי 2025 (₪)" value={ac.annual} onChange={v=>upd(activeIdx,"annual",v)} suffix="₪" hint="עמוד 2 — מחזור עסקאות שנת 2025 לעסק שנפתח עד 31.12.24" />
                  <Field label="מחזור זכאות 03/2026 (₪)" value={ac.elig} onChange={v=>upd(activeIdx,"elig",v)} suffix="₪" hint="עמוד 10 — חד חודשי: מחזור חודש 03/2026 | דו: 03-04/2026" />
                  <Field label="מכפיל מחזור בסיס" value={ac.baseMultiplier} onChange={v=>upd(activeIdx,"baseMultiplier",v)} suffix="×" hint="ממוצע 03/25–02/26 ÷ ממוצע 2025 | ברירת מחדל 1.2 = הנחה" isAssumption />
                  <Sec>ג. הוצאות / תשומות</Sec>
                  <Field label="הוצאות/תשומות שנתי 2025 (₪)" value={ac.annualExp} onChange={v=>upd(activeIdx,"annualExp",v)} suffix="₪" hint="עמוד 6 — סה"כ שנתי, מחולק ב-12 אוטומטית" />
                  <Sec>ד. שכר עובדים</Sec>
                  <Field label="שכר טופס 102 — 03/2026 (₪)" value={ac.sal102} onChange={v=>upd(activeIdx,"sal102",v)} suffix="₪" hint="עמוד 5 — שכר ברוטו שדווח" />
                  <Field label="מספר עובדים — 03/2026" value={ac.numEmp} onChange={v=>upd(activeIdx,"numEmp",v)} hint="לחישוב תקרת מענק שכר" />
                  <div style={{display:"flex"}}>
                    <Field label="מילואים מב"ל (₪)" value={ac.miluum} onChange={v=>upd(activeIdx,"miluum",v)} suffix="₪" half />
                    <Field label="שכר חל"ת/חופשה (₪)" value={ac.chalat} onChange={v=>upd(activeIdx,"chalat",v)} suffix="₪" half />
                  </div>
                  <Sec>ה. מסלולים מיוחדים</Sec>
                  <div style={{display:"flex"}}>
                    <Field label="קבלן ביצוע (×0.68)?" value={ac.isKaplan?"כן":"לא"} onChange={v=>upd(activeIdx,"isKaplan",v==="כן")} select={["לא","כן"]} half />
                    <Field label="הגדלת מקדם ×1.5?" value={ac.factorBoost?"כן":"לא"} onChange={v=>upd(activeIdx,"factorBoost",v==="כן")} select={["לא","כן"]} half />
                  </div>
                  <div style={{height:12}} />
                </div>

                {/* RESULTS */}
                <div style={{ background:"#fff", borderRadius:10, border:`1px solid ${border}`, boxShadow:"0 2px 16px rgba(15,39,68,.08)", overflow:"hidden", display:"flex", flexDirection:"column" }}>
                  <div style={{ background:navy, color:"#fff", padding:"11px 16px", fontSize:13, fontWeight:700, fontFamily:"'Assistant',sans-serif" }}>🧮 תוצאות חישוב</div>
                  {!ar.hasData ? <EmptyState /> : <>
                    <Sec>ירידת מחזורים</Sec>
                    <RR label="ממוצע חודשי 2025" val={ILv(ar.avg2025)} formula="מחזור שנתי ÷ 12" />
                    <RR label="מחזור בסיס (הנחה)" val={ILv(ar.base)} sub={`ממוצע × ${ac.baseMultiplier}`} formula="⚠️ הנחת עבודה — לאימות" warn />
                    <RR label="מחזור זכאות" val={ILv(parseFloat(ac.elig))} rr="עמוד 10" />
                    <RR label="שיעור ירידה" val={P(ar.drop)} hi formula={`(${ILv(ar.base)} − ${ILv(parseFloat(ac.elig))}) ÷ ${ILv(ar.base)}`} />
                    <RR label={ar.passes ? "✅ עובר סף ירידה" : "❌ לא עובר סף — לא זכאי"} val={`סף: ${P(ar.minDrop)}`} hi={ar.passes} warn={!ar.passes} />
                    <Sec>מקדם פיצוי</Sec>
                    <RR label="מקדם בסיסי" val={P(ar.fb)} rr="עמוד 4" formula={`${P(ar.drop)} → ${ar.drop>=.8?"80%–100% → 22%":ar.drop>=.6?"60%–80% → 15%":ar.drop>=.4?"40%–60% → 11%":"25%–40% → 7%"}`} />
                    {ac.isKaplan && <RR label="קבלן ביצוע" val="×0.68" />}
                    {ac.factorBoost && <RR label="הגדלת מקדם" val="×1.5" rr="עמוד 7" />}
                    <RR label="מקדם סופי" val={P(ar.f)} hi />
                    <Sec>מענק הוצאות קבועות</Sec>
                    <RR label="ממוצע הוצאות חודשי" val={ILv(ar.avgExp)} formula="הוצאות שנתי ÷ 12" />
                    <RR label="מענק הוצאות קבועות" val={ILv(ar.fixedGrant)} rr="עמוד 4" formula={`${ILv(ar.avgExp)} × ${P(ar.f)}`} hi />
                    <Sec>מענק שכר</Sec>
                    <RR label="שכר נטו לאחר ניכויים" val={ILv(ar.netSal)} formula="102 − מילואים − חל"ת" />
                    <RR label="מענק שכר לפני תקרה" val={ILv(ar.salBefore)} rr="עמוד 5" formula={`${ILv(ar.netSal)} × ${ar.empMult} × 0.75 × ${P(ar.drop)}`} />
                    {isFinite(ar.salCap) && <RR label="תקרת שכר (עובדים)" val={ILv(ar.salCap)} formula={`13,773 × ${ar.empMult} × ${ac.numEmp} × ${P(ar.drop)}`} />}
                    <RR label="מענק שכר (אחרי תקרה)" val={ILv(ar.salGrant)} hi />
                    <div style={{ height:1, background:`linear-gradient(90deg,${navy},${navy2})`, margin:"8px 0" }} />
                    <RR label="סה"כ לפני תקרה" val={ILv(ar.total)} hi />
                    <RR label="תקרה כללית" val={ILv(ar.globalCap)} rr="עמוד 7" sub={parseFloat(ac.annual)>100000000?"ליניארית: 600K + 0.003 × עודף מעל 100M":"קבועה: מחזור עד 100M"} />
                    <div style={{ margin:"12px 16px", padding:"18px 20px", background:navy, borderRadius:10, textAlign:"center", position:"relative", overflow:"hidden" }}>
                      <div style={{ position:"absolute", inset:0, background:"radial-gradient(ellipse at 50% 0%, rgba(201,151,58,.18), transparent 70%)", pointerEvents:"none" }} />
                      <div style={{ fontSize:12, color:"rgba(255,255,255,.6)", marginBottom:4, fontWeight:600 }}>🏆 מענק סופי משוער</div>
                      <div style={{ fontSize:32, fontWeight:900, color:gold2, fontFamily:"'Assistant',sans-serif" }}>{ILv(ar.finalGrant)}</div>
                      {ar.total > ar.globalCap && <div style={{ fontSize:11, color:"#f87171", marginTop:6 }}>הפסד בתקרה: {ILv(ar.total - ar.globalCap)}</div>}
                      <div style={{ fontSize:11, color:"rgba(255,255,255,.4)", marginTop:4 }}>MIN({ILv(ar.total)}, {ILv(ar.globalCap)})</div>
                    </div>
                    <div style={{ fontSize:10, color:gray, padding:"8px 16px 14px", lineHeight:1.6, borderTop:`1px solid ${grayL}` }}>
                      ⚠️ <strong>דיסקליימר:</strong> סימולציה בלבד על בסיס טיוטת מסמך לשכת יועצי המס. המתווה טרם אושר ונחקק. אין ייעוץ מקצועי.
                    </div>
                  </>}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
